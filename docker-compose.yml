services:
  api:
    build: .
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    volumes:
      - ./local_models:/app/local_models:ro
      - ./models:/app/models:ro
      - ./data/faiss_store:/app/data/faiss_store
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
